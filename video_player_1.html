<style>
        .fade-overlay {
            transition: opacity 0.5s ease-in-out;
        }
        .idle .fade-overlay {
            opacity: 0;
            pointer-events: none;
        }
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #c0c1ff; /* primary */
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 0 10px rgba(192, 193, 255, 0.5);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
        }
        /* Custom progress fill via JS */
      </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background h-screen w-screen overflow-hidden relative select-none" id="player-container">
<!-- Fullscreen Video Background Placeholder -->
<div class="absolute inset-0 z-0">
<div class="w-full h-full bg-cover bg-center" data-alt="Cinematic still from a dark, moody sci-fi movie. A sleek, futuristic spaceship interior with neon blue and purple accent lights reflecting off polished metallic surfaces. The atmosphere is tense and mysterious, matching a high-end streaming service aesthetic." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuB2gi87BTwrLSbAjNzCqgoD1xIHN_v99sqcge2pOmOH3kN9EaOEaPE71eC1ic1UbiB0M237qxpsKu3LLBvMzxrl7DFDhElpcksQ-5wexHWdcqBJuws3R5qYu-fs5kvDaDGYfb-Y4xm6Md3GHyuzhZ2q31ctiE-NZHFp6Zu-R2Y2GBJYaCEsUY44ADDlMQmK3fskISfCUVsGyzVJKnDaFMje_x5ySzCxGuzoGWvOHAUt003s87PLvzs')"></div>
<!-- Dark gradient overlay for readability -->
<div class="absolute inset-0 bg-gradient-to-b from-background/80 via-transparent to-background/90"></div>
</div>
<!-- UI Overlay (Fades out when idle) -->
<div class="absolute inset-0 z-10 flex flex-col justify-between fade-overlay p-container-margin">
<!-- Top Controls -->
<div class="flex items-center justify-between w-full pt-safe">
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-white/10 backdrop-blur-[20px] border border-white/20 text-on-background hover:bg-white/20 transition-colors active:scale-90 shadow-[inset_0_1px_0_rgba(255,255,255,0.2)]">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="flex flex-col items-center">
<span class="font-label-caps text-label-caps text-outline uppercase tracking-widest">S3: E4</span>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-background drop-shadow-md">The Neon Horizon</h1>
</div>
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-white/10 backdrop-blur-[20px] border border-white/20 text-on-background hover:bg-white/20 transition-colors active:scale-90 shadow-[inset_0_1px_0_rgba(255,255,255,0.2)]">
<span class="material-symbols-outlined" data-icon="subtitles">subtitles</span>
</button>
</div>
<!-- Center Controls (Play/Pause) -->
<div class="flex-grow flex items-center justify-center gap-8">
<button class="w-14 h-14 flex items-center justify-center rounded-full bg-white/5 backdrop-blur-md text-on-background hover:bg-white/10 transition-colors active:scale-90">
<span class="material-symbols-outlined text-4xl" data-icon="replay_10">replay_10</span>
</button>
<!-- Primary Play Button with Glow -->
<button class="w-20 h-20 flex items-center justify-center rounded-full bg-white/10 backdrop-blur-[20px] border border-white/20 text-primary transition-all active:scale-90 shadow-[inset_0_1px_0_rgba(255,255,255,0.2)] relative">
<div class="absolute inset-0 rounded-full bg-primary/15 blur-[20px]"></div>
<span class="material-symbols-outlined text-5xl relative z-10" data-icon="pause" data-weight="fill">pause</span>
</button>
<button class="w-14 h-14 flex items-center justify-center rounded-full bg-white/5 backdrop-blur-md text-on-background hover:bg-white/10 transition-colors active:scale-90">
<span class="material-symbols-outlined text-4xl" data-icon="forward_10">forward_10</span>
</button>
</div>
<!-- Bottom Controls -->
<div class="w-full pb-safe flex flex-col gap-4">
<!-- Next Episode Prompt (Conditional appearance typically) -->
<div class="flex justify-end mb-2">
<button class="flex items-center gap-2 px-4 py-2 rounded-lg bg-surface/80 backdrop-blur-xl border border-white/10 text-on-background hover:bg-surface transition-colors">
<span class="font-body-sm text-body-sm">Next: The Fall</span>
<span class="material-symbols-outlined text-sm" data-icon="skip_next">skip_next</span>
</button>
</div>
<!-- Progress Bar -->
<div class="flex items-center gap-4 w-full">
<span class="font-body-sm text-body-sm text-outline w-12 text-right font-variant-numeric">24:12</span>
<div class="relative flex-grow h-6 flex items-center group">
<input class="w-full relative z-10" id="progress-slider" max="100" min="0" type="range" value="45"/>
<!-- Custom Track Fill -->
<div class="absolute left-0 h-1 bg-gradient-to-r from-primary to-secondary rounded-l-full pointer-events-none" id="progress-fill" style="width: 45%;"></div>
</div>
<span class="font-body-sm text-body-sm text-outline w-12 font-variant-numeric">54:00</span>
</div>
<!-- Bottom Action Row -->
<div class="flex items-center justify-between w-full mt-2">
<div class="flex items-center gap-4">
<button class="text-on-background hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="volume_up">volume_up</span>
</button>
<!-- Volume slider (desktop only usually, but good for robust UI) -->
<div class="hidden md:block w-24">
<input class="w-full" max="100" min="0" type="range" value="80"/>
</div>
</div>
<div class="flex items-center gap-6">
<button class="text-on-background hover:text-primary transition-colors flex flex-col items-center gap-1">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
<button class="text-on-background hover:text-primary transition-colors flex flex-col items-center gap-1">
<span class="material-symbols-outlined" data-icon="cast">cast</span>
</button>
<button class="text-on-background hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="fullscreen">fullscreen</span>
</button>
</div>
</div>
</div>
</div>
<script>
        // Simple idle timer for UI fade
        let idleTimer;
        const playerContainer = document.getElementById('player-container');
        
        function resetIdleTimer() {
            playerContainer.classList.remove('idle');
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => {
                playerContainer.classList.add('idle');
            }, 3000);
        }

        playerContainer.addEventListener('mousemove', resetIdleTimer);
        playerContainer.addEventListener('touchstart', resetIdleTimer);
        playerContainer.addEventListener('click', resetIdleTimer);
        
        // Init
        resetIdleTimer();

        // Progress bar custom fill logic
        const progressSlider = document.getElementById('progress-slider');
        const progressFill = document.getElementById('progress-fill');

        progressSlider.addEventListener('input', (e) => {
            progressFill.style.width = e.target.value + '%';
        });
    </script>
</body></html>
