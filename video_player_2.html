<style>
        .glass-overlay {
            background: linear-gradient(to top, rgba(13, 13, 21, 0.95) 0%, rgba(13, 13, 21, 0.6) 50%, rgba(13, 13, 21, 0) 100%);
        }
        .controls-fade {
            transition: opacity 0.4s ease-in-out;
        }
        .controls-hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-background text-on-background h-screen w-screen overflow-hidden flex flex-col justify-center items-center relative font-body-md" id="player-container">
<!-- Video Background Placeholder -->
<div class="absolute inset-0 z-0 bg-cover bg-center" data-alt="A highly cinematic shot from a futuristic sci-fi film showing a vast, detailed cityscape at night. Neon lights in shades of indigo and purple pierce the darkness. The scene is rendered with anamorphic lens flares and a deep sense of scale and atmosphere, typical of a high-end streaming television series." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBBWqxQE2MMLlxHiFHY0sWRugmc49-AjHjqoGPegojIkgmp6Ro_NInc4tr9Je49XIFl_ZUCd4ar11enunwFOjBAPxoakwml70SEpMDlkCvWi1vIuQ206XcgzUTc22M-kvEPcUA6cmTqfk1UFkC4Za0OvLydZeQ_s4fTq1bO8rZTYRl7C2wI_py1Wid2DHAhy5qfNiGXD5a-4Sa-Sf-pb0YcfpNCkHeH16KC0kiPRtw10MfSOZoFsP8')"></div>
<!-- UI Overlay (Fades during playback) -->
<div class="absolute inset-0 z-10 flex flex-col justify-between controls-fade" id="ui-overlay">
<!-- Top Bar -->
<div class="flex items-center justify-between p-container-margin pt-[40px] bg-gradient-to-b from-background/80 to-transparent">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface/10 backdrop-blur-xl border border-white/10 text-on-background active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="flex space-x-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface/10 backdrop-blur-xl border border-white/10 text-on-background active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="cast">cast</span>
</button>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface/10 backdrop-blur-xl border border-white/10 text-on-background active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="more_vert">more_vert</span>
</button>
</div>
</div>
<!-- Center Loading / Play Indicator (Optional/Hidden by default usually, showing for design) -->
<!-- <div class="self-center flex items-center justify-center">
            <div class="w-16 h-16 border-4 border-primary border-t-transparent rounded-full animate-spin"></div>
        </div> -->
<!-- Bottom Controls -->
<div class="glass-overlay p-container-margin pb-10 flex flex-col gap-element-gap">
<!-- Metadata -->
<div class="mb-4">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-background shadow-lg">Nexus Skyline</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">S1:E4 "The Grid"</p>
</div>
<!-- Progress Bar -->
<div class="flex items-center gap-4 w-full mb-2 group">
<span class="font-label-caps text-label-caps text-on-surface-variant w-10 text-right">24:12</span>
<div class="flex-grow h-1.5 bg-surface-variant rounded-full relative cursor-pointer">
<!-- Buffered -->
<div class="absolute left-0 top-0 h-full bg-outline/40 rounded-full w-[80%]"></div>
<!-- Played -->
<div class="absolute left-0 top-0 h-full bg-gradient-to-r from-primary to-secondary rounded-full w-[45%] shadow-[0_0_12px_rgba(192,193,255,0.6)]"></div>
<!-- Scrubber Knob -->
<div class="absolute top-1/2 -translate-y-1/2 w-4 h-4 bg-white rounded-full shadow-lg left-[45%] -ml-2 opacity-0 group-hover:opacity-100 transition-opacity"></div>
</div>
<span class="font-label-caps text-label-caps text-on-surface-variant w-10">58:00</span>
</div>
<!-- Primary ControlsRow -->
<div class="flex items-center justify-between mt-2">
<!-- Left Secondary Controls -->
<div class="flex items-center gap-4 text-on-surface-variant">
<button class="hover:text-primary transition-colors active:scale-90">
<span class="material-symbols-outlined" data-icon="subtitles">subtitles</span>
</button>
<button class="hover:text-primary transition-colors active:scale-90">
<span class="material-symbols-outlined" data-icon="volume_up">volume_up</span>
</button>
</div>
<!-- Main Playback Controls -->
<div class="flex items-center gap-6">
<button class="text-on-background hover:text-primary transition-colors active:scale-90">
<span class="material-symbols-outlined text-[32px]" data-icon="replay_10" data-weight="fill" style="font-variation-settings: 'FILL' 1;">replay_10</span>
</button>
<button class="w-16 h-16 flex items-center justify-center rounded-full bg-primary text-on-primary shadow-[0_0_20px_rgba(192,193,255,0.3)] active:scale-95 transition-all">
<span class="material-symbols-outlined text-[40px]" data-icon="pause" data-weight="fill" style="font-variation-settings: 'FILL' 1;">pause</span>
</button>
<button class="text-on-background hover:text-primary transition-colors active:scale-90">
<span class="material-symbols-outlined text-[32px]" data-icon="forward_10" data-weight="fill" style="font-variation-settings: 'FILL' 1;">forward_10</span>
</button>
</div>
<!-- Right Secondary Controls -->
<div class="flex items-center gap-4 text-on-surface-variant">
<button class="flex items-center gap-1 hover:text-primary transition-colors active:scale-95">
<span class="material-symbols-outlined" data-icon="skip_next">skip_next</span>
<span class="hidden md:inline font-label-caps text-label-caps">Next</span>
</button>
<button class="hover:text-primary transition-colors active:scale-90">
<span class="material-symbols-outlined" data-icon="fullscreen">fullscreen</span>
</button>
</div>
</div>
</div>
</div>
<!-- Script to simulate fadeout -->
<script>
        const uiOverlay = document.getElementById('ui-overlay');
        let hideTimeout;

        function resetTimer() {
            uiOverlay.classList.remove('controls-hidden');
            clearTimeout(hideTimeout);
            hideTimeout = setTimeout(() => {
                uiOverlay.classList.add('controls-hidden');
            }, 3000);
        }

        document.body.addEventListener('mousemove', resetTimer);
        document.body.addEventListener('touchstart', resetTimer);
        document.body.addEventListener('click', resetTimer);

        // Initial trigger
        resetTimer();
    </script>
</body></html>
